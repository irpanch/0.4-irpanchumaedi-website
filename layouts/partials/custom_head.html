<script>
document.addEventListener('DOMContentLoaded', function () {
  // 1. Fade in saat scroll
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('is-visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

  document.querySelectorAll('.home-section, article, .card').forEach(function(el) {
    observer.observe(el);
  });

  // 2. Navbar shadow saat scroll
  window.addEventListener('scroll', function() {
    var navbar = document.querySelector('.navbar');
    if (navbar) {
      navbar.classList.toggle('scrolled', window.scrollY > 50);
    }
  });

  // 3. Stagger delay pada skill cards
  document.querySelectorAll('.featurette').forEach(function(el, i) {
    el.style.transitionDelay = (i * 0.1) + 's';
  });
});
</script>
